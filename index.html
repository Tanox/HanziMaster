<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#fdfbf7" media="(prefers-color-scheme: light)">
    <meta name="theme-color" content="#0f172a" media="(prefers-color-scheme: dark)">
    
    <title>HanziMaster - Learn Chinese Character Strokes & Etymology with AI</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              paper: '#fdfbf7',
              vermilion: {
                50: '#fdf3f2',
                100: '#fbe5e4',
                200: '#f7cfcd',
                300: '#f0aaa6',
                400: '#e67872',
                500: '#cf352e',
                600: '#bc221b',
                700: '#9d1913',
                800: '#821915',
                900: '#6b1916',
              }
            },
            fontFamily: {
              hanzi: ['"Noto Serif SC"', 'serif'],
              sans: ['Inter', 'sans-serif'],
            },
            keyframes: {
              fadeIn: {
                '0%': { opacity: '0', transform: 'translateY(10px)' },
                '100%': { opacity: '1', transform: 'translateY(0)' },
              }
            },
            animation: {
              'fade-in': 'fadeIn 0.5s ease-out forwards',
            }
          }
        }
      }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
      body {
        font-family: 'Inter', sans-serif;
        overscroll-behavior-y: none;
      }
      .font-hanzi {
        font-family: 'Noto Serif SC', serif;
      }
      ruby {
        ruby-align: center;
        ruby-position: over;
      }
      rt {
        font-family: 'Inter', sans-serif;
        font-weight: 500;
        letter-spacing: 0.05em;
      }

      }

      }
    </style>
