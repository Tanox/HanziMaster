<!-- public/icon.svg v0.7.1 -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <filter id="seal-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-opacity="0.25"/>
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-opacity="0.1"/>
    </filter>
    <filter id="grain" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.6" numOctaves="3" result="noise"/>
      <feColorMatrix type="saturate" values="0" in="noise" result="desat"/>
      <feBlend mode="overlay" in="SourceGraphic" in2="desat" opacity="0.15"/>
    </filter>
  </defs>
  <g filter="url(#seal-glow)">
    <rect width="440" height="440" x="36" y="36" rx="100" fill="#bc221b" filter="url(#grain)"/>
    <text x="50%" y="50%" dx="0" dy="35" text-anchor="middle" dominant-baseline="central" fill="#fdfbf7" font-family="'Noto Serif SC', serif" font-weight="bold" font-size="300">汉</text>
  </g>
</svg>